# config/global.conf - 全局配置（Oracle版本）

# Oracle数据库配置
export ORACLE_HOST="localhost"
export ORACLE_PORT="1521"
export ORACLE_SID="ORCL"
export ORACLE_SERVICE=""  # 可选：使用服务名而非SID
export ORACLE_USER="system"
export ORACLE_PASS="oracle"
export ORACLE_SCHEMA="MYAPP"

# Oracle客户端配置
export ORACLE_HOME="/u01/app/oracle/product/19.3.0/dbhome_1"
export PATH="$ORACLE_HOME/bin:$PATH"
export LD_LIBRARY_PATH="$ORACLE_HOME/lib:$LD_LIBRARY_PATH"

# 导出工具选择
export USE_EXPDP="true"  # 优先使用expdp

# 备份配置
export BACKUP_RETENTION="7"
export BACKUP_DIR="$PROJECT_ROOT/backups"
export BACKUP_COMPRESS="true"

# 报表配置
export REPORT_DIR="$PROJECT_ROOT/reports"

# 日志配置
export LOG_LEVEL="INFO"

# 通知配置
export WEBHOOK_URL=""  # Slack/钉钉通知webhook

# 高级配置
export PARALLEL_DEGREE="4"  # 并行度
export EXPDP_COMPRESSION="ALL"  # 压缩级别: ALL, DATA_ONLY, METADATA_ONLY, NONE
