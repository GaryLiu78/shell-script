# config/modules.conf - 模块配置

# 模块加载顺序
MODULE_ORDER="database backup report"

# Oracle模块特定配置
export ORACLE_MODULE_ENABLED="true"
export ORACLE_BACKUP_SCHEMAS="MYAPP,HR,SCOTT"  # 要备份的schemas
export ORACLE_BACKUP_TABLES="MYAPP.USERS,MYAPP.ORDERS"  # 要备份的表
export ORACLE_RETENTION_ARCHIVELOG="3"  # 归档日志保留天数

# 备份模块配置
export BACKUP_MODULE_ENABLED="true"
export BACKUP_PARALLEL="4"

# 报表模块配置
export REPORT_MODULE_ENABLED="true"
export REPORT_FORMATS="html,pdf"  # 支持的报表格式

# 流水线配置
export PIPELINE_ENABLED="true"
export PIPELINE_STAGES="check,backup,report"
export PIPELINE_FAIL_FAST="true"
export PIPELINE_NOTIFY_ON_SUCCESS="true"
export PIPELINE_NOTIFY_ON_FAILURE="true"
